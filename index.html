<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initia-scale=1.0">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>お天気ツール</title>
    </head>
    <body id="body">
        <div class="container my-4">
            <h1 id="city-weather">名古屋の天気</h1>
            <button id="getBtn" class="btn btn-primary">天気を取得</button>

            <div id="result" class="card mt-3" style="width: 25rem;">
                <div class="card-body">
                    <p id="temp" class="card-text">ボタンを押してください</p>
                </div>
            </div>
        </div>
        <div class="container my-4">
            <label for="city">主要都市を選択</label>
            <select id="city" name="city">
                <option value="tokyo">東京</option>
                <option value="osaka">大阪</option>
                <option value="nagoya">名古屋</option>
                <option value="fukuoka">福岡</option>
            </select>
            <button id="getBtn-city" class="btn btn-primary">都市を変更</button>
        </div>
        <!-- ページの一番下などに、データの出典を表示する -->
        <footer class="container my-4">
            <small>Weather data by <a href="https://open-meteo.com/">Open-Meteo.com</a>（CC BY 4.0）</small>
        </footer>
        <script type="module" src="js/main.js"></script>
    </body>
</html>
