<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initia-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>お天気ツール</title>
    </head>
    <body id="body">
        <div class="container my-4 mt-3">
            <h1 id="city-weather">名古屋の天気</h1>
            <button id="getBtn" class="col-md-4 btn btn-primary">天気を取得</button>
            <div class="row g-3 mt-3">
                <div class="col-md-4">
                    <div class="card"><div class="card-body">
                        <h5 class="card-title">天候</h5>
                        <p id="weat" class="card-text">ボタンを押してください</p>
                    </div></div>
                </div>
                <div class="col-md-4">
                    <div class="card"><div class="card-body">
                        <h5 class="card-title">気温</h5>
                        <p id="temp" class="card-text">ボタンを押してください</p>
                    </div></div>
                </div>
                <div class="col-md-4">
                    <div class="card"><div class="card-body">
                        <h5 class="card-title">風速</h5>
                        <p id="wind" class="card-text">ボタンを押してください</p>
                    </div></div>
                </div>
            </div>
            <div class="col-md-4 mt-3">
                <label for="city">主要都市を選択</label>
                <select id="city" name="city">
                    <option value="tokyo">東京</option>
                    <option value="osaka">大阪</option>
                    <option value="nagoya">名古屋</option>
                    <option value="fukuoka">福岡</option>
                </select>
                <button id="getBtn-city" class="btn btn-primary">都市を変更</button>
            </div>
        </div>
        <!-- ページの一番下などに、データの出典を表示する -->
        <footer class="container my-4">
            <small>Weather data by <a href="https://open-meteo.com/">Open-Meteo.com</a>（CC BY 4.0）</small>
        </footer>
        <script type="module" src="js/main.js"></script>
    </body>
</html>
